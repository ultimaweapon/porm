name: Publish Macros
on:
  push:
    tags:
    - 'macros-*'
jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
    - name: Check out repository
      uses: actions/checkout@v6
    - name: Publish
      run: cargo publish -p porm-macros
